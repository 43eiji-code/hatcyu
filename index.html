<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>発注管理｜NST奥平</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#EEF2F7;--surface:#fff;--primary:#0D2540;--accent:#1A6FC4;--accent2:#00B4D8;--danger:#E53E3E;--text:#0D1B2A;--muted:#5A7184;--border:#C5D5E8;--radius:10px;--shadow:0 2px 12px rgba(13,37,64,.10)}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',Helvetica,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
header{background:var(--primary);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
header h1{font-size:17px;font-weight:700;letter-spacing:.5px}
.tab-bar{display:flex;background:var(--primary);border-top:1px solid rgba(255,255,255,.15)}
.tab-btn{flex:1;padding:9px 2px;color:rgba(255,255,255,.6);border:none;background:none;font-size:11px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab-btn.active{color:#fff;border-bottom-color:var(--accent2);font-weight:700}
.screen{display:none;padding:14px;max-width:860px;margin:0 auto}
.screen.active{display:block}
.sup-choose-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.sup-choose-btn{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;font-weight:600}
.sup-choose-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sup-label-bar{font-size:13px;font-weight:700;color:var(--accent);padding:6px 12px;background:#DDEEFF;border-radius:8px;margin-bottom:10px}
.search-box{background:var(--surface);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);margin-bottom:12px}
.search-input{width:100%;border:2px solid var(--border);border-radius:8px;padding:10px 14px;font-size:16px;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--accent)}
.result-list{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.result-item{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.result-item:last-child{border-bottom:none}
.result-item:active{background:#DDEEFF}
.item-name{font-weight:600;font-size:13px;margin-bottom:2px}
.item-meta{font-size:11px;color:var(--muted)}
.add-icon{font-size:18px;color:var(--accent);font-weight:700;margin-left:8px;flex-shrink:0}
.result-count{font-size:12px;color:var(--muted);padding:7px 14px;background:#FAFAF8;border-bottom:1px solid var(--border)}
.no-result{text-align:center;padding:32px;color:var(--muted)}
.common-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px;margin-bottom:12px}
.common-card h3{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.common-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:480px){.common-fields{grid-column:1fr}}
.field-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600}
.field-group input,.field-group select{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px;background:#fff;outline:none}
.field-group input:focus,.field-group select:focus{border-color:var(--accent)}
.cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cart-header h2{font-size:15px;font-weight:700}
.badge{background:var(--danger);color:#fff;border-radius:10px;padding:2px 7px;font-size:12px;font-weight:700}
.cart-empty{text-align:center;padding:50px 20px;color:var(--muted)}
.cart-item{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px;margin-bottom:10px}
.cart-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cart-item-name{font-weight:700;font-size:13px;flex:1;margin-right:8px;line-height:1.4}
.delete-btn{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;line-height:1;padding:0 2px;flex-shrink:0}
.cart-fields{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-accent{background:var(--accent2);color:#fff}
.btn-outline{background:#fff;border:2px solid var(--accent);color:var(--accent)}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-block{width:100%;margin-top:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.history-item{background:var(--surface);border-radius:var(--radius);padding:11px 14px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer}
.history-date{font-size:11px;color:var(--muted);margin-bottom:3px}
.history-title{font-weight:700;font-size:13px;margin-bottom:2px}
.history-meta{font-size:12px;color:var(--muted)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--primary);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.print-hint{background:#E8F4FF;border:1px solid var(--accent);border-radius:8px;padding:12px 14px;font-size:13px;color:#0D4A8A;margin-bottom:12px;line-height:1.6}
@media print{
  header,.tab-bar,.screen:not(#screen-order),.action-bar,.print-hint,.no-print{display:none!important}
  #screen-order{display:block!important;padding:0!important}
  body{background:#fff!important}
  @page{margin:10mm;size:A4}
}</style>
</head>
<body>
<header><div style="font-size:20px">📋</div><h1>発注管理アプリ</h1></header>
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('search')">🔍 検索</button>
  <button class="tab-btn" id="tab-cart" onclick="showTab('cart')">📦 リスト</button>
  <button class="tab-btn" onclick="showTab('order')">📄 注文書</button>
  <button class="tab-btn" onclick="showTab('history')">🕘 履歴</button>
  <button class="tab-btn" onclick="showTab('settings')">⚙️ 設定</button>
</div>
<div class="screen active" id="screen-search">
  <div class="common-card"><h3>① 取引先を選択</h3><div class="sup-choose-wrap" id="supplier-select-wrap"></div></div>
  <div id="search-area" style="display:none">
    <div class="sup-label-bar" id="selected-supplier-label"></div>
    <div class="search-box"><input type="search" class="search-input" id="search-input" placeholder="材料名・ふりがなで検索…" oninput="doSearch()" autocomplete="off"></div>
    <div id="search-results"></div>
  </div>
</div>
<div class="screen" id="screen-cart">
  <div class="common-card"><h3>発注情報</h3>
    <div class="common-fields">
      <div class="field-group"><label>発注日</label><input id="g-date" type="date"></div>
      <div class="field-group"><label>希望納期（搬入日）</label><input id="g-delivery" type="date"></div>
      <div class="field-group"><label>工事番号</label><input id="g-kojino" type="text"></div>
      <div class="field-group"><label>工事名称</label><input id="g-kojiname" type="text"></div>
      <div class="field-group" style="grid-column:1/-1"><label>搬入場所</label><input id="g-address2" type="text"></div>
      <div class="field-group" style="grid-column:1/-1"><label>荷受者</label><input id="g-receiver" type="text"></div>
    </div></div>
  <div class="cart-header"><h2>発注リスト <span class="badge" id="cart-count">0</span></h2><button class="btn btn-outline btn-sm" onclick="clearCart()">クリア</button></div>
  <div id="cart-items"></div>
  <button class="btn btn-primary btn-block" onclick="showTab('order');buildOrder()">注文書を作成 →</button>
</div>
<div class="screen" id="screen-order">
  <div class="print-hint no-print">📱 <b>PDF保存手順：</b> ①「🖨️ PDF保存」タップ → ②新しいタブで注文書が開く → ③画面下の共有ボタン（□↑）→「プリント」→ピンチアウトで拡大 →「PDF」→「ファイルに保存」</div>
  <div class="action-bar no-print">
    <button class="btn btn-accent" id="pdf-btn" onclick="savePDF()">🖨️ PDF保存</button>
    <button class="btn btn-outline" onclick="saveHistory()">💾 履歴保存</button>
    <button class="btn btn-outline" onclick="showTab('cart')">← 戻る</button>
  </div>
  <div id="order-content"></div>
</div>
<div class="screen" id="screen-history"><h2 style="font-size:15px;font-weight:700;margin-bottom:10px">発注履歴</h2><div id="history-list"></div></div>
<div class="screen" id="screen-settings">
  <div class="common-card"><h3>会社情報</h3><div class="common-fields">
    <div class="field-group" style="grid-column:1/-1"><label>会社名</label><input id="s-company" type="text"></div>
    <div class="field-group" style="grid-column:1/-1"><label>住所</label><input id="s-address" type="text"></div>
    <div class="field-group"><label>TEL</label><input id="s-tel" type="text"></div>
    <div class="field-group"><label>FAX</label><input id="s-fax" type="text"></div>
    <div class="field-group"><label>携帯</label><input id="s-mobile" type="text"></div>
    <div class="field-group"><label>E-Mail</label><input id="s-email" type="text"></div>
  </div></div>
  <div class="common-card"><h3>担当者情報（各自で設定）</h3><div class="common-fields">
    <div class="field-group"><label>担当者名</label><input id="s-person" type="text"></div>
  </div></div>
  <div class="common-card"><h3>よく使う発注情報（各自で設定）</h3><div class="common-fields">
    <div class="field-group"><label>工事番号</label><input id="g-kojino-s" type="text"></div>
    <div class="field-group"><label>工事名称</label><input id="g-kojiname-s" type="text"></div>
    <div class="field-group" style="grid-column:1/-1"><label>搬入場所</label><input id="g-address2-s" type="text"></div>
    <div class="field-group" style="grid-column:1/-1"><label>荷受者</label><input id="g-receiver-s" type="text"></div>
  </div></div>
  <button class="btn btn-primary btn-block" onclick="saveSettings()">💾 設定を保存</button>
</div>
<div class="toast" id="toast"></div>

<script>
var cart = [];
var currentSupplier = null;
var searchTimer = null;
var SUPPLIERS = [];

function init() {
  SUPPLIERS = Array.from(new Set(MATERIALS.map(function(m){return m.supplier;}).filter(Boolean))).sort();
  loadSettings();
  loadCart();
  renderHistory();
  buildSupplierSelect();
}

function buildSupplierSelect() {
  var wrap = document.getElementById('supplier-select-wrap');
  wrap.innerHTML = '';
  SUPPLIERS.forEach(function(s) {
    var b = document.createElement('button');
    b.className = 'sup-choose-btn';
    b.textContent = s;
    b.addEventListener('click', function() { chooseSupplier(s, b); });
    wrap.appendChild(b);
  });
}

function chooseSupplier(sup, btn) {
  if (currentSupplier === sup) return;
  if (cart.length > 0 && !confirm('取引先を変更すると、現在のリストがクリアされます。よろしいですか？')) return;
  currentSupplier = sup;
  cart = [];
  saveCart();
  document.querySelectorAll('.sup-choose-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('selected-supplier-label').textContent = sup + ' の材料';
  document.getElementById('search-area').style.display = 'block';
  updateCartBadge();
  doSearch();
}

    company: 'ＮＳT奥平株式会社  本社',

    receiver: 'NST奥平㈱杉原（08088605926）'
  };

  setVal('g-kojino', s.kojino); setVal('g-kojiname', s.kojiname);

function saveSettings() {

function getVal(id) { var el = document.getElementById(id); return el ? el.value : ''; }
function setVal(id, v) { var el = document.getElementById(id); if (el) el.value = v; }

function doSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(_doSearch, 150); }

function _doSearch() {
  var q = document.getElementById('search-input').value.trim();
  var container = document.getElementById('search-results');
  if (!currentSupplier) { container.innerHTML = ''; return; }
  var data = MATERIALS.filter(function(m) { return m.supplier === currentSupplier; });
  if (q) {
    var words = q.toLowerCase().split(/\s+/).filter(function(w){ return w.length > 0; });
    data = data.filter(function(m) {
      var target = m.name.toLowerCase() + ' ' + (m.kana || '') + ' ' + (m.note || '').toLowerCase();
      return words.every(function(w){ return target.indexOf(w) >= 0; });
    });
  }
  var total = data.length;
  if (total === 0) { container.innerHTML = '<div class="result-list"><div class="no-result">該当なし</div></div>'; return; }
  var list = document.createElement('div');
  list.className = 'result-list';
  var countEl = document.createElement('div');
  countEl.className = 'result-count';
  countEl.textContent = total + '件（最大80件表示）';
  list.appendChild(countEl);
  data.slice(0, 80).forEach(function(m) {
    var item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML =
      '<div style="flex:1;min-width:0"><div class="item-name">' + esc(m.name) + '</div>' +
      '<div class="item-meta">' + esc(m.unit || '') + (m.note ? '　' + esc(m.note) : '') + '</div></div>' +
      '<div class="add-icon">＋</div>';
    item.addEventListener('click', function() { addToCart(m); });
    list.appendChild(item);
  });
  container.innerHTML = '';
  container.appendChild(list);
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function addToCart(m) {
  if (cart.find(function(c) { return c.name === m.name; })) { showToast('すでにリストにあります'); return; }
  var item = { name: m.name, unit: m.unit || '', supplier: m.supplier, qty: m.stdQty || 1, note: '', id: Date.now() };
  cart.push(item);
  SETS.filter(function(s) { return s.main === m.name; }).forEach(function(s) {
    if (!cart.find(function(c) { return c.name === s.sub; })) {
      var sub = MATERIALS.find(function(m2) { return m2.name === s.sub; });
      if (sub) cart.push({ name: sub.name, unit: s.unit || sub.unit || '', supplier: sub.supplier, qty: Math.ceil((item.qty || 1) * s.ratio), note: '', id: Date.now() + Math.random() });
    }
  });
  saveCart(); showToast('追加: ' + m.name.slice(0, 20)); updateCartBadge();
}

function removeFromCart(id) {
  cart = cart.filter(function(c) { return c.id !== id; });
  saveCart(); renderCart(); updateCartBadge();
}

function renderCart() {
  var el = document.getElementById('cart-items');
  updateCartBadge();
  if (cart.length === 0) {
    el.innerHTML = '<div class="cart-empty"><div style="font-size:40px;margin-bottom:10px">📦</div><p>材料を選択してください</p></div>';
    return;
  }
  el.innerHTML = '';
  cart.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML =
      '<div class="cart-item-header">' +
        '<div class="cart-item-name">' + esc(item.name) + '</div>' +
        '<button class="delete-btn">✕</button>' +
      '</div>' +
      '<div class="cart-fields">' +
        '<div class="field-group"><label>数量</label><input type="number" value="' + item.qty + '" min="0" step="0.1"></div>' +
        '<div class="field-group"><label>単位</label><input type="text" value="' + esc(item.unit) + '"></div>' +
        '<div class="field-group" style="grid-column:1/-1"><label>備考</label><input type="text" value="' + esc(item.note) + '" placeholder="寸法・色など"></div>' +
      '</div>';
    div.querySelector('.delete-btn').addEventListener('click', function() { removeFromCart(item.id); });
    var inputs = div.querySelectorAll('input');
    inputs[0].addEventListener('change', function() { updateCart(item.id, 'qty', this.value); });
    inputs[1].addEventListener('change', function() { updateCart(item.id, 'unit', this.value); });
    inputs[2].addEventListener('change', function() { updateCart(item.id, 'note', this.value); });
    el.appendChild(div);
  });
}

function updateCart(id, field, val) {
  var item = cart.find(function(c) { return c.id === id; });
  if (item) { item[field] = field === 'qty' ? (parseFloat(val) || 0) : val; saveCart(); }
}

function clearCart() {
  if (cart.length === 0) return;
  if (confirm('発注リストをクリアしますか？')) { cart = []; saveCart(); renderCart(); updateCartBadge(); }
}

function saveCart() {
  try { localStorage.setItem('nst_cart', JSON.stringify(cart)); localStorage.setItem('nst_supplier', currentSupplier || ''); } catch(e) {}
}

function loadCart() {
  try {
    var d = localStorage.getItem('nst_cart');
    var sup = localStorage.getItem('nst_supplier');
    if (d) cart = JSON.parse(d);
    if (sup && sup !== 'null') {
      currentSupplier = sup;
      // restore active button after DOM is built
      setTimeout(function() {
        var btns = document.querySelectorAll('.sup-choose-btn');
        btns.forEach(function(b) {
          if (b.textContent === sup) {
            b.classList.add('active');
            document.getElementById('selected-supplier-label').textContent = sup + ' の材料';
            document.getElementById('search-area').style.display = 'block';
          }
        });
      }, 0);
    }
    renderCart();
  } catch(e) { cart = []; }
}

  var n = cart.length;
  document.getElementById('cart-count').textContent = n;

      '<div style="font-size:11px;"><span style="font-size:10px;">No. </span>' + esc(kojino) + '</div>' +
    '</div>' +
    '<div style="font-size:15px;font-weight:900;margin-bottom:3px;">工事名称：　' + esc(kojiname) + '</div>' +
    '<table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:0;">' +
      '<tr><td style="border:1px solid #999;padding:5px 8px;width:52px;text-align:center;font-weight:700;white-space:nowrap;">搬入場所</td><td style="border:1px solid #999;padding:5px 8px;">' + esc(address2) + '</td></tr>' +
      '<tr><td style="border:1px solid #999;padding:5px 8px;text-align:center;font-weight:700;">荷受者</td><td style="border:1px solid #999;padding:5px 12px;">' + esc(receiver) + '</td></tr>' +
    '</table>' +
    '<table style="width:100%;border-collapse:collapse;font-size:11px;">' +
      '<thead><tr>' +
        '<th style="border:1px solid #999;padding:5px 8px;background:#f0f0f0;text-align:center;">品名</th>' +
        '<th style="border:1px solid #999;padding:5px 8px;background:#f0f0f0;text-align:center;width:52px;">数量</th>' +
        '<th style="border:1px solid #999;padding:5px 8px;background:#f0f0f0;text-align:center;width:38px;">単位</th>' +
      '</tr></thead>' +
      '<tbody>' + rowsHTML + '</tbody>' +
    '</table>';
  wrap.appendChild(orderDiv);
}

function savePDF() {
  var el = document.getElementById('main-order');
  if (!el) { showToast('注文書が空です'); return; }

  var date = getVal('g-date') || new Date().toISOString().slice(0, 10);
  var seq = parseInt(localStorage.getItem('nst_seq_' + date) || '0') + 1;
  localStorage.setItem('nst_seq_' + date, String(seq).padStart(3, '0'));

  // Build a standalone print page and open it
  var content = el.outerHTML;
  var printHTML = '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">' +
    '<meta name="viewport" content="width=device-width,initial-scale=1.0">' +
    '<title>材料注文書</title>' +
    '<style>' +
    '*{box-sizing:border-box;margin:0;padding:0}' +
    'body{font-family:Helvetica,Arial,sans-serif;background:#fff;padding:10mm;}' +
    '@media print{body{padding:0;}@page{margin:10mm;size:A4}}' +
    '</style></head><body>' +
    content +
    '<script>window.onload=function(){window.print();}</' + 'script>' +
    '</body></html>';

  var blob = new Blob([printHTML], { type: 'text/html;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
  showToast('新しいタブで印刷画面が開きます');
}

function saveHistory() {
  var entry = {
    id: Date.now(), date: getVal('g-date'), kojino: getVal('g-kojino'),
    kojiname: getVal('g-kojiname'), supplier: currentSupplier || '',
    items: JSON.parse(JSON.stringify(cart)), created: new Date().toISOString()
  };
  var hist = [];
  try { hist = JSON.parse(localStorage.getItem('nst_history') || '[]'); } catch(e) {}
  hist.unshift(entry); hist = hist.slice(0, 50);
  localStorage.setItem('nst_history', JSON.stringify(hist));
  showToast('履歴に保存しました'); renderHistory();
}

function renderHistory() {
  var hist = [];
  try { hist = JSON.parse(localStorage.getItem('nst_history') || '[]'); } catch(e) {}
  var el = document.getElementById('history-list');
  if (!el) return;
  if (hist.length === 0) { el.innerHTML = '<div style="text-align:center;padding:40px;color:#999">履歴がありません</div>'; return; }
  el.innerHTML = '';
  hist.forEach(function(h) {
    var div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML =
      '<div class="history-date">' + esc(h.date) + ' 保存</div>' +
      '<div class="history-title">' + esc(h.supplier) + '　' + esc(h.kojino) + ' ' + esc(h.kojiname) + '</div>' +
      '<div class="history-meta">' + h.items.length + '品目</div>';
    div.addEventListener('click', function() { loadHistory(h.id); });
    el.appendChild(div);
  });
}

function loadHistory(id) {
  var hist = [];
  try { hist = JSON.parse(localStorage.getItem('nst_history') || '[]'); } catch(e) {}
  var h = hist.find(function(x) { return x.id === id; });
  if (!h) return;
  cart = h.items; currentSupplier = h.supplier;
  setVal('g-date', h.date); setVal('g-kojino', h.kojino); setVal('g-kojiname', h.kojiname);
  saveCart(); renderCart(); updateCartBadge();
  document.querySelectorAll('.sup-choose-btn').forEach(function(b) {
    b.classList.remove('active');
    if (b.textContent === h.supplier) {
      b.classList.add('active');
      document.getElementById('selected-supplier-label').textContent = h.supplier + ' の材料';
      document.getElementById('search-area').style.display = 'block';
    }
  });
  showTab('cart'); showToast('履歴を読み込みました');
}

function showTab(name) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('screen-' + name).classList.add('active');
  var idx = ['search', 'cart', 'order', 'history', 'settings'].indexOf(name);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (name === 'cart') renderCart();
  if (name === 'history') renderHistory();
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

window.addEventListener('DOMContentLoaded', init);

</script>
